<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pastel Pop Switch 🎮</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f1a;
  --console:#1b1b2e;
  --screen:#0b1020;
  --pink:#f9a8d4;
  --blue:#93c5fd;
  --green:#86efac;
  --yellow:#fde68a;
}

body{
  margin:0;
  background:linear-gradient(135deg,#0b1020,#1b1b2e);
  font-family:'Press Start 2P', monospace;
  color:#e5e7eb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* SWITCH BODY */
#console{
  width:900px;
  height:420px;
  background:var(--console);
  border-radius:40px;
  box-shadow:0 0 60px rgba(0,0,0,0.7);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px;
  position:relative;
}

/* JOYCONS */
.joycon{
  width:120px;
  height:360px;
  border-radius:30px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

#leftJoy{
  background:linear-gradient(#93c5fd,#60a5fa);
}

#rightJoy{
  background:linear-gradient(#f9a8d4,#f472b6);
}

button{
  font-family:inherit;
  cursor:pointer;
}

/* JOY BUTTONS */
.joyBtn{
  width:40px;
  height:40px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,0.2);
}

.smallBtn{
  width:30px;
  height:30px;
  border:none;
  background:rgba(255,255,255,0.15);
  border-radius:8px;
}

/* SCREEN */
#screen{
  flex:1;
  height:100%;
  background:var(--screen);
  border-radius:30px;
  margin:0 20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:20px;
  position:relative;
  overflow:hidden;
}

/* PASTEL GRID BACKGROUND */
#screen::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(147,197,253,0.08) 2px,transparent 2px),
    linear-gradient(90deg,rgba(249,168,212,0.08) 2px,transparent 2px);
  background-size:24px 24px;
  pointer-events:none;
}

/* SCANLINES */
#screen::after{
  content:"";
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.03),
    rgba(255,255,255,0.03) 2px,
    transparent 2px,
    transparent 5px
  );
  pointer-events:none;
}

/* TOP INFO */
#top{
  z-index:2;
  text-align:center;
  font-size:10px;
  line-height:1.6;
}

/* TAP AREA */
#tap{
  width:100%;
  padding:20px;
  border:none;
  border-radius:15px;
  background:linear-gradient(90deg,var(--green),var(--blue));
  color:#0b1020;
  font-size:10px;
}

#tap:active{transform:scale(0.95);}

/* SHOP */
.shop button{
  width:100%;
  margin-top:5px;
  padding:8px;
  border:none;
  border-radius:10px;
  background:#2a2a40;
  color:#fff;
  font-size:8px;
}

.event{
  color:var(--yellow);
  font-size:8px;
}

/* SAVE INDICATOR */
#save{
  position:absolute;
  bottom:10px;
  right:15px;
  font-size:8px;
  opacity:0.5;
}
</style>
</head>
<body>

<div id="console">

  <!-- LEFT JOYCON -->
  <div id="leftJoy" class="joycon">
    <button class="smallBtn" onclick="bonus(1)">▲</button>
    <div>
      <button class="smallBtn" onclick="bonus(2)">◀</button>
      <button class="smallBtn" onclick="bonus(3)">▶</button>
    </div>
    <button class="smallBtn" onclick="bonus(4)">▼</button>
  </div>

  <!-- SCREEN -->
  <div id="screen">
    <div id="top">
      <div>🍡 Pastel Pop Switch</div>
      <div>Clicks: <span id="clicks">0</span></div>
      <div>CPC: <span id="cpc">1</span></div>
      <div>CPS: <span id="cps">0</span></div>
      <div id="event" class="event"></div>
    </div>

    <button id="tap">TAP 🍬</button>

    <div class="shop">
      <button onclick="buy('cursor')">Cursor +1 CPS (<span id="c1">10</span>)</button>
      <button onclick="buy('booster')">Booster +1 CPC (<span id="c2">25</span>)</button>
      <button onclick="buy('factory')">Factory +5 CPS (<span id="c3">100</span>)</button>
    </div>

    <div id="save">autosaving...</div>
  </div>

  <!-- RIGHT JOYCON -->
  <div id="rightJoy" class="joycon">
    <button class="joyBtn" onclick="bonus(5)">A</button>
    <button class="joyBtn" onclick="bonus(6)">B</button>
    <button class="joyBtn" onclick="bonus(7)">X</button>
    <button class="joyBtn" onclick="bonus(8)">Y</button>
  </div>

</div>

<script>
let clicks = parseInt(localStorage.getItem('clicks')) || 0;
let cpc = parseInt(localStorage.getItem('cpc')) || 1;
let cps = parseInt(localStorage.getItem('cps')) || 0;

let costs = JSON.parse(localStorage.getItem('costs')) || {
  cursor:10,
  booster:25,
  factory:100
};

let multiplier = 1;

function save(){
  localStorage.setItem('clicks',clicks);
  localStorage.setItem('cpc',cpc);
  localStorage.setItem('cps',cps);
  localStorage.setItem('costs',JSON.stringify(costs));
  document.getElementById('save').innerText = "saved ✔";
  setTimeout(()=>document.getElementById('save').innerText="autosaving...",1000);
}

function update(){
  document.getElementById('clicks').innerText=Math.floor(clicks);
  document.getElementById('cpc').innerText=cpc;
  document.getElementById('cps').innerText=cps;
  document.getElementById('c1').innerText=costs.cursor;
  document.getElementById('c2').innerText=costs.booster;
  document.getElementById('c3').innerText=costs.factory;
}

document.getElementById('tap').onclick=()=>{
  clicks+=cpc*multiplier;
  update();save();
};

function buy(type){
  if(clicks<costs[type])return;
  clicks-=costs[type];
  if(type==='cursor')cps+=1;
  if(type==='booster')cpc+=1;
  if(type==='factory')cps+=5;
  costs[type]=Math.floor(costs[type]*1.5);
  update();save();
}

setInterval(()=>{
  clicks+=(cps*multiplier)/10;
  update();save();
},100);

function eventTrigger(){
  const el=document.getElementById('event');
  const r=Math.random();

  if(r<0.33){el.innerText="⚡ sugar rush!";multiplier=2;
    setTimeout(()=>{multiplier=1;el.innerText="";},8000);
  }
  else if(r<0.66){el.innerText="🍃 sleepy mode";multiplier=0.5;
    setTimeout(()=>{multiplier=1;el.innerText="";},8000);
  }
  else{el.innerText="🍬 candy burst!";clicks+=50;save();update();
    setTimeout(()=>el.innerText="",5000);
  }
}

setInterval(eventTrigger,20000);

function bonus(id){clicks+=id*2;update();save();}

update();
</script>

</body>
</html>
