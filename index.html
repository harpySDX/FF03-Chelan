<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Pop Clicker 🎮</title>
<style>
body {
  margin:0;
  background:#0f172a;
  font-family: monospace;
  color:#e2e8f0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#console {
  width:360px;
  height:640px;
  background:#1e293b;
  border-radius:20px;
  box-shadow:0 0 40px #000;
  padding:15px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.screen {
  background:#020617;
  border:4px solid #334155;
  border-radius:10px;
  padding:10px;
  height:45%;
}

#top {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#bottom {
  display:flex;
  flex-direction:column;
  gap:10px;
}

#clickBtn {
  font-size:20px;
  padding:20px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

#clickBtn:active {
  transform:scale(0.95);
}

.shop button {
  width:100%;
  padding:8px;
  background:#334155;
  border:none;
  color:white;
  margin-top:5px;
  cursor:pointer;
}

.stat {
  margin:5px 0;
}
</style>
</head>
<body>
<div id="console">
  <div id="top" class="screen">
    <h3>Pixel Pop 🍪</h3>
    <div class="stat">Clicks: <span id="clicks">0</span></div>
    <div class="stat">Per Click: <span id="cpc">1</span></div>
    <div class="stat">Per Second: <span id="cps">0</span></div>
  </div>

  <div id="bottom" class="screen">
    <button id="clickBtn">TAP!</button>
    <div class="shop">
      <button onclick="buy('cursor')">Cursor (+1 cps) - <span id="cursorCost">10</span></button>
      <button onclick="buy('booster')">Booster (+1 click) - <span id="boosterCost">25</span></button>
      <button onclick="buy('factory')">Factory (+5 cps) - <span id="factoryCost">100</span></button>
    </div>
  </div>
</div>

<script>
let clicks = 0;
let cpc = 1;
let cps = 0;

let costs = {
  cursor: 10,
  booster: 25,
  factory: 100
};

function update() {
  document.getElementById('clicks').innerText = Math.floor(clicks);
  document.getElementById('cpc').innerText = cpc;
  document.getElementById('cps').innerText = cps;

  document.getElementById('cursorCost').innerText = costs.cursor;
  document.getElementById('boosterCost').innerText = costs.booster;
  document.getElementById('factoryCost').innerText = costs.factory;
}

document.getElementById('clickBtn').onclick = () => {
  clicks += cpc;
  update();
};

function buy(type) {
  if (clicks < costs[type]) return;

  clicks -= costs[type];

  if (type === 'cursor') cps += 1;
  if (type === 'booster') cpc += 1;
  if (type === 'factory') cps += 5;

  costs[type] = Math.floor(costs[type] * 1.5);
  update();
}

setInterval(() => {
  clicks += cps / 10;
  update();
}, 100);

update();
</script>
</body>
</html>
